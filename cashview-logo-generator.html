<!DOCTYPE html>
<html>
<head><title>CashView Logo Generator</title></head>
<body style="background:#222;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px;font-family:sans-serif;">
<canvas id="c" width="1024" height="1024" style="width:256px;height:256px;border-radius:20px;"></canvas>
<button onclick="download()" style="padding:12px 28px;background:#E5634A;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;">Download PNG</button>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const S = 1024;

// Background — coral rounded rect
const r = 180;
ctx.beginPath();
ctx.moveTo(r, 0); ctx.lineTo(S-r, 0);
ctx.quadraticCurveTo(S, 0, S, r);
ctx.lineTo(S, S-r);
ctx.quadraticCurveTo(S, S, S-r, S);
ctx.lineTo(r, S);
ctx.quadraticCurveTo(0, S, 0, S-r);
ctx.lineTo(0, r);
ctx.quadraticCurveTo(0, 0, r, 0);
ctx.closePath();
ctx.fillStyle = '#E5634A';
ctx.fill();

// White wallet icon (centered)
ctx.save();
ctx.translate(512, 512);
ctx.scale(16, 16); // scale up the icon
ctx.strokeStyle = '#fff';
ctx.lineWidth = 1.6;
ctx.lineCap = 'round';
ctx.lineJoin = 'round';

// Wallet body
ctx.beginPath();
ctx.moveTo(-11, -4);
ctx.lineTo(-11, 6);
ctx.quadraticCurveTo(-11, 8, -9, 8);
ctx.lineTo(10, 8);
ctx.quadraticCurveTo(12, 8, 12, 6);
ctx.lineTo(12, 0);
ctx.moveTo(-11, -4);
ctx.lineTo(10, -4);
ctx.quadraticCurveTo(12, -4, 12, -2);
ctx.lineTo(12, 0);
ctx.moveTo(-11, -4);
ctx.lineTo(-11, -7);
ctx.lineTo(9, -7);
ctx.stroke();

// Wallet pocket (right side)
ctx.beginPath();
ctx.moveTo(6, 0);
ctx.lineTo(12, 0);
ctx.lineTo(12, 4);
ctx.lineTo(6, 4);
ctx.quadraticCurveTo(4, 4, 4, 2);
ctx.quadraticCurveTo(4, 0, 6, 0);
ctx.stroke();

// Dot inside pocket
ctx.beginPath();
ctx.arc(8.5, 2, 1.2, 0, Math.PI*2);
ctx.fillStyle = '#fff';
ctx.fill();

ctx.restore();

function download() {
  const a = document.createElement('a');
  a.download = 'cashview-logo-1024.png';
  a.href = c.toDataURL('image/png');
  a.click();
}

// Auto-trigger after short delay
setTimeout(download, 500);
</script>
</body>
</html>
