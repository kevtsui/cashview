<!DOCTYPE html>
<html>
<body>
<canvas id="c"></canvas>
<script>
function makeIcon(size) {
  const c = document.getElementById('c');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  const r = size * 0.18;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(size-r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size-r);
  ctx.quadraticCurveTo(size, size, size-r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size-r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#E5634A';
  ctx.fill();
  // Wallet icon scaled
  ctx.save();
  ctx.translate(size/2, size/2);
  ctx.scale(size/24 * 0.65, size/24 * 0.65);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.6;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(-11,-4); ctx.lineTo(-11,6); ctx.quadraticCurveTo(-11,8,-9,8);
  ctx.lineTo(10,8); ctx.quadraticCurveTo(12,8,12,6); ctx.lineTo(12,0);
  ctx.moveTo(-11,-4); ctx.lineTo(10,-4); ctx.quadraticCurveTo(12,-4,12,-2); ctx.lineTo(12,0);
  ctx.moveTo(-11,-4); ctx.lineTo(-11,-7); ctx.lineTo(9,-7);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(6,0); ctx.lineTo(12,0); ctx.lineTo(12,4); ctx.lineTo(6,4);
  ctx.quadraticCurveTo(4,4,4,2); ctx.quadraticCurveTo(4,0,6,0);
  ctx.stroke();
  ctx.beginPath(); ctx.arc(8.5,2,1.2,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
  ctx.restore();
  const a = document.createElement('a');
  a.download = `icon-${size}.png`;
  a.href = c.toDataURL('image/png');
  a.click();
}
setTimeout(() => { makeIcon(192); setTimeout(() => makeIcon(512), 300); }, 300);
</script>
</body>
</html>
